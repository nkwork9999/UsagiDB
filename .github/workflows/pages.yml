name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Don't queue more than one deploy at a time, but let in-flight runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Show MoonBit version
        run: moon version --all

      - name: Build JS target
        run: |
          moon check --target js
          moon build --target js
          echo "=== Listing target output ==="
          ls -la target/ || true
          ls -la target/js/ || true
          ls -la target/js/release/ || true
          ls -la target/js/release/build/ || true
          echo "=== Bundles found ==="
          find target -name "*.js" -type f | head -20

      - name: Stage demo site
        run: |
          mkdir -p _site
          cp index.html sw.js _site/
          cp -r web _site/
          # MoonBit JS bundles. Use rsync rather than `cp -r src/.` because
          # different coreutils versions disagree on the dot syntax.
          if [ -d target/js/release/build ]; then
            mkdir -p _site/target/js/release/build
            cp -r target/js/release/build/* _site/target/js/release/build/
          else
            echo "ERROR: target/js/release/build not found — did the build succeed?"
            exit 1
          fi
          echo "=== _site contents ==="
          find _site -maxdepth 6 -type f | head -30

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
