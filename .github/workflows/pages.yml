name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install MoonBit
        run: |
          set -x
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH
          ls -la "$HOME/.moon/bin" || true

      - name: Show MoonBit version
        run: |
          which moon
          moon version --all

      - name: Build JS target (verbose)
        run: |
          set -x
          moon check --target js
          moon build --target js
          echo "=== target tree ==="
          find target -type d 2>/dev/null | sort | head -60
          echo "=== JS files ==="
          find target -name "*.js" -type f 2>/dev/null

      - name: Stage demo site
        run: |
          set -e
          mkdir -p _site
          cp index.html sw.js _site/
          cp -r web _site/
          # MoonBit's build dir layout has shifted between versions; locate
          # any `build/` directory under `target/js/` and copy from there
          # into the path that index.html expects.
          BUILD_DIR=$(find target/js -type d -name build -print -quit 2>/dev/null || true)
          if [ -z "$BUILD_DIR" ]; then
            echo "FATAL: no build/ subdir found under target/js"
            find target -type d
            exit 1
          fi
          echo "Using BUILD_DIR=$BUILD_DIR"
          mkdir -p _site/target/js/release/build
          cp -r "$BUILD_DIR"/. _site/target/js/release/build/
          echo "=== _site contents ==="
          find _site -maxdepth 6 -type f | head -40

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
